name: Stage A

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest

      - name: Validate Stage A fixture
        run: artist-portrait validate --project fixtures/stage_a/valid_project.yaml

      - name: Verify schema generation is stable
        run: |
          artist-portrait generate-schema --output-dir /tmp/artist-portrait-schemas
          diff -u schemas/project_config.schema.json /tmp/artist-portrait-schemas/project_config.schema.json
          diff -u schemas/project_state.schema.json /tmp/artist-portrait-schemas/project_state.schema.json
          diff -u schemas/source_record.schema.json /tmp/artist-portrait-schemas/source_record.schema.json

      - name: Verify Stage A gate blocks media commands
        run: |
          set +e
          artist-portrait scan --project fixtures/stage_a/valid_project.yaml
          code=$?
          set -e
          test "$code" -eq 7
